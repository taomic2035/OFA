# OFA Center - Docker Compose Configuration
# Version: v8.4.0
# Production-ready deployment with PostgreSQL, Redis, and monitoring

version: '3.8'

services:
  # OFA Center Service
  center:
    build:
      context: ./src/center
      dockerfile: Dockerfile
    image: ofa/center:latest
    container_name: ofa-center
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9090:9090"
      - "8081:8081"
    environment:
      - CENTER_ID=center-production
      - GRPC_ADDRESS=:9090
      - REST_ADDRESS=:8080
      - WS_ADDRESS=:8081
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=ofa
      - DB_PASSWORD=ofa_secret
      - DB_NAME=ofa_center
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=info
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ofa-network
    volumes:
      - center-data:/data

  postgres:
    image: postgres:15-alpine
    container_name: ofa-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=ofa
      - POSTGRES_PASSWORD=ofa_secret
      - POSTGRES_DB=ofa_center
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ofa"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ofa-network

  redis:
    image: redis:7-alpine
    container_name: ofa-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ofa-network

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: ofa-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - ofa-network

  grafana:
    image: grafana/grafana:10.0.0
    container_name: ofa-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    networks:
      - ofa-network

  adminer:
    image: adminer:latest
    container_name: ofa-adminer
    restart: unless-stopped
    ports:
      - "8082:8080"
    networks:
      - ofa-network

networks:
  ofa-network:
    driver: bridge

volumes:
  center-data:
  postgres-data:
  redis-data:
