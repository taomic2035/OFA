name: OFA CI/CD Enhanced

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

env:
  GO_VERSION: '1.22'
  JAVA_VERSION: '17'

jobs:
  # ====================
  # Go Test Job
  # ====================
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      working-directory: src/center
      run: go mod download

    - name: Run Center tests
      working-directory: src/center
      run: go test -v -race -coverprofile=coverage-center.out -covermode=atomic ./...

    - name: Run Agent tests
      working-directory: src/agent/go
      run: go test -v -race -coverprofile=coverage-agent.out -covermode=atomic ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./src/center/coverage-center.out,./src/agent/go/coverage-agent.out
        flags: unittests
        fail_ci_if_error: false

  # ====================
  # Android SDK Build Job
  # ====================
  android-build:
    name: Android SDK Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build SDK Release AAR
      working-directory: src/sdk/android
      run: ./gradlew assembleRelease --no-daemon

    - name: Run SDK Unit Tests
      working-directory: src/sdk/android
      run: ./gradlew test --no-daemon

    - name: Upload AAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: sdk-aar
        path: src/sdk/android/sdk/build/outputs/aar/sdk-release.aar

  # ====================
  # Security Scan Job
  # ====================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Run Gosec Security Scanner
      uses: securego/gosec@master
      with:
        args: ./src/center/... ./src/agent/go/...
      continue-on-error: true

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './src/center'
        format: 'table'
        exit-code: '0'
        ignore-unfixed: true
      continue-on-error: true

  # ====================
  # Build Binaries Job
  # ====================
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [go-test]
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Build Center
      working-directory: src/center
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        BINARY_NAME="center"
        if [ "${{ matrix.goos }}" = "windows" ]; then
          BINARY_NAME="center.exe"
        fi
        go build -a -installsuffix cgo -ldflags="-s -w -X main.Version=${{ github.sha }}" -o $BINARY_NAME ./cmd/center

    - name: Build Agent
      working-directory: src/agent/go
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        BINARY_NAME="agent"
        if [ "${{ matrix.goos }}" = "windows" ]; then
          BINARY_NAME="agent.exe"
        fi
        go build -a -installsuffix cgo -ldflags="-s -w" -o $BINARY_NAME ./cmd/agent

    - name: Upload Center artifact
      uses: actions/upload-artifact@v4
      with:
        name: center-${{ matrix.goos }}-${{ matrix.goarch }}
        path: src/center/center*

    - name: Upload Agent artifact
      uses: actions/upload-artifact@v4
      with:
        name: agent-${{ matrix.goos }}-${{ matrix.goarch }}
        path: src/agent/go/agent*

  # ====================
  # Lint Job
  # ====================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Run golangci-lint for Center
      uses: golangci/golangci-lint-action@v4
      with:
        working-directory: src/center
        args: --timeout=5m

    - name: Run golangci-lint for Agent
      uses: golangci/golangci-lint-action@v4
      with:
        working-directory: src/agent/go
        args: --timeout=5m

  # ====================
  # Integration Test Job
  # ====================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ofa_test
          POSTGRES_PASSWORD: ofa_test_pass
          POSTGRES_DB: ofa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Download Center Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: center-linux-amd64
        path: ./bin

    - name: Run integration tests
      working-directory: src/center
      env:
        DATABASE_URL: postgres://ofa_test:ofa_test_pass@localhost:5432/ofa_test?sslmode=disable
        REDIS_URL: redis://localhost:6379
      run: |
        go test -v -tags=integration ./tests/e2e/...

  # ====================
  # Docker Build Job
  # ====================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [go-test, android-build, security-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Login to Docker Hub (optional)
      uses: docker/login-action@v3
      if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata for Center
      id: meta-center
      uses: docker/metadata-action@v5
      with:
        images: |
          ghcr.io/${{ github.repository }}/center
          ofa/center
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha

    - name: Build and push Center
      uses: docker/build-push-action@v5
      with:
        context: ./src/center
        push: true
        tags: ${{ steps.meta-center.outputs.tags }}
        labels: ${{ steps.meta-center.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Extract metadata for Agent
      id: meta-agent
      uses: docker/metadata-action@v5
      with:
        images: |
          ghcr.io/${{ github.repository }}/agent
          ofa/agent
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha

    - name: Build and push Agent
      uses: docker/build-push-action@v5
      with:
        context: ./src/agent/go
        push: true
        tags: ${{ steps.meta-agent.outputs.tags }}
        labels: ${{ steps.meta-agent.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ====================
  # Release Job
  # ====================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [docker, build, android-build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/**/*
        generate_release_notes: true
        body: |
          ## OFA Release ${${{ github.ref_name }}}

          ### Binaries
          - Center: Linux/Darwin/Windows (amd64/arm64)
          - Agent: Linux/Darwin/Windows (amd64/arm64)
          - Android SDK: AAR package

          ### Docker Images
          - `ghcr.io/${{ github.repository }}/center:${{ github.ref_name }}`
          - `ghcr.io/${{ github.repository }}/agent:${{ github.ref_name }}`

  # ====================
  # Summary Job
  # ====================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [go-test, android-build, build, lint, security-scan]
    if: always()
    steps:
    - name: Check Status
      run: |
        echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Go Tests | ${{ needs.go-test.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Android Build | ${{ needs.android-build.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Security | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY