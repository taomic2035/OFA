name: OFA CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      working-directory: src/center
      run: go mod download

    - name: Run Center tests
      working-directory: src/center
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Run Agent tests
      working-directory: src/agent/go
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./src/center/coverage.out,./src/agent/go/coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build Center
      working-directory: src/center
      run: |
        CGO_ENABLED=0 GOOS=linux go build -a -installsuffix cgo -o center ./cmd/center
        CGO_ENABLED=0 GOOS=darwin go build -a -installsuffix cgo -o center-darwin ./cmd/center
        CGO_ENABLED=0 GOOS=windows go build -a -installsuffix cgo -o center.exe ./cmd/center

    - name: Build Agent
      working-directory: src/agent/go
      run: |
        CGO_ENABLED=0 GOOS=linux go build -a -installsuffix cgo -o agent ./cmd/agent
        CGO_ENABLED=0 GOOS=darwin go build -a -installsuffix cgo -o agent-darwin ./cmd/agent
        CGO_ENABLED=0 GOOS=windows go build -a -installsuffix cgo -o agent.exe ./cmd/agent

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: binaries
        path: |
          src/center/center*
          src/agent/go/agent*

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Center
      uses: docker/build-push-action@v5
      with:
        context: ./src/center
        push: true
        tags: ofa/center:latest,ofa/center:${{ github.sha }}

    - name: Build and push Agent
      uses: docker/build-push-action@v5
      with:
        context: ./src/agent/go
        push: true
        tags: ofa/agent:latest,ofa/agent:${{ github.sha }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Run golangci-lint for Center
      uses: golangci/golangci-lint-action@v3
      with:
        working-directory: src/center

    - name: Run golangci-lint for Agent
      uses: golangci/golangci-lint-action@v3
      with:
        working-directory: src/agent/go