server:
  name: "ofa-center"
  version: "0.5.0"

grpc:
  address: ":9090"

rest:
  address: ":8080"

# Storage configuration
# Type: "memory" (default, no persistence) or "sqlite" (file-based persistence)
database:
  type: "memory"  # Change to "sqlite" for persistence
  database: "data/ofa.db"  # SQLite database file path (used when type=sqlite)
  # Legacy fields (for future PostgreSQL support)
  host: "localhost"
  port: 5432
  user: "ofa"
  password: "ofa123"

redis:
  address: "localhost:6379"
  password: ""
  db: 0

etcd:
  endpoints:
    - "localhost:2379"

scheduler:
  default_strategy: "hybrid"
  max_concurrent: 1000
  task_timeout: 30s

agent:
  heartbeat_interval: 30s
  heartbeat_timeout: 60s
  offline_threshold: 120s