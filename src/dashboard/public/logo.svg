<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A5B4FC;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1E1B4B" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Outer orbital ring -->
  <ellipse cx="100" cy="100" rx="70" ry="70" fill="none" stroke="url(#ringGrad)" stroke-width="2" stroke-dasharray="8 4" opacity="0.5"/>

  <!-- Middle orbital ring -->
  <ellipse cx="100" cy="100" rx="50" ry="50" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Inner orbital ring -->
  <ellipse cx="100" cy="100" rx="30" ry="30" fill="none" stroke="white" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Connection lines between nodes -->
  <g stroke="white" stroke-width="1.5" stroke-opacity="0.4" filter="url(#glow)">
    <line x1="100" y1="100" x2="100" y2="30"/>
    <line x1="100" y1="100" x2="170" y2="100"/>
    <line x1="100" y1="100" x2="100" y2="170"/>
    <line x1="100" y1="100" x2="30" y2="100"/>
    <line x1="100" y1="100" x2="156" y2="44"/>
    <line x1="100" y1="100" x2="156" y2="156"/>
    <line x1="100" y1="100" x2="44" y2="156"/>
    <line x1="100" y1="100" x2="44" y2="44"/>
  </g>

  <!-- Center core - abstract representation -->
  <circle cx="100" cy="100" r="20" fill="white" opacity="0.95"/>
  <circle cx="100" cy="100" r="12" fill="#6366F1" opacity="0.8"/>
  <circle cx="100" cy="100" r="5" fill="white"/>

  <!-- Outer nodes - abstract particles -->
  <g filter="url(#glow)">
    <circle cx="100" cy="30" r="8" fill="white" opacity="0.9"/>
    <circle cx="170" cy="100" r="8" fill="white" opacity="0.9"/>
    <circle cx="100" cy="170" r="8" fill="white" opacity="0.9"/>
    <circle cx="30" cy="100" r="8" fill="white" opacity="0.9"/>
    <circle cx="156" cy="44" r="6" fill="#A5B4FC" opacity="0.8"/>
    <circle cx="156" cy="156" r="6" fill="#A5B4FC" opacity="0.8"/>
    <circle cx="44" cy="156" r="6" fill="#A5B4FC" opacity="0.8"/>
    <circle cx="44" cy="44" r="6" fill="#A5B4FC" opacity="0.8"/>
  </g>

  <!-- Subtle orbiting particles -->
  <circle cx="145" cy="55" r="3" fill="#60A5FA" opacity="0.6"/>
  <circle cx="155" cy="105" r="2" fill="#60A5FA" opacity="0.5"/>
  <circle cx="95" cy="155" r="2.5" fill="#60A5FA" opacity="0.5"/>
  <circle cx="50" cy="110" r="2" fill="#60A5FA" opacity="0.4"/>
</svg>