<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1E40AF" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Network Nodes representing federated agents -->
  <!-- Center node (O - Omni) -->
  <circle cx="100" cy="100" r="28" fill="white" opacity="0.95"/>
  <text x="100" y="108" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1D4ED8" text-anchor="middle">O</text>

  <!-- Surrounding nodes (F - Federated) -->
  <!-- Top -->
  <circle cx="100" cy="45" r="18" fill="url(#nodeGrad)"/>
  <text x="100" y="51" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">F</text>

  <!-- Top Right -->
  <circle cx="148" cy="70" r="18" fill="url(#nodeGrad)"/>
  <text x="148" y="76" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">A</text>

  <!-- Bottom Right -->
  <circle cx="148" cy="130" r="18" fill="url(#nodeGrad)"/>
  <text x="148" y="136" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">F</text>

  <!-- Bottom -->
  <circle cx="100" cy="155" r="18" fill="url(#nodeGrad)"/>
  <text x="100" y="161" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">A</text>

  <!-- Bottom Left -->
  <circle cx="52" cy="130" r="18" fill="url(#nodeGrad)"/>
  <text x="52" y="136" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">F</text>

  <!-- Top Left -->
  <circle cx="52" cy="70" r="18" fill="url(#nodeGrad)"/>
  <text x="52" y="76" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">A</text>

  <!-- Connection lines (representing federation) -->
  <g stroke="white" stroke-width="2" stroke-opacity="0.4">
    <line x1="100" y1="72" x2="100" y2="63"/>
    <line x1="125" y1="82" x2="132" y2="75"/>
    <line x1="125" y1="118" x2="132" y2="125"/>
    <line x1="100" y1="128" x2="100" y2="137"/>
    <line x1="75" y1="118" x2="68" y2="125"/>
    <line x1="75" y1="82" x2="68" y2="75"/>

    <!-- Outer connections -->
    <line x1="118" y1="55" x2="132" y2="60" stroke-opacity="0.25"/>
    <line x1="145" y1="88" x2="145" y2="112" stroke-opacity="0.25"/>
    <line x1="132" y1="140" x2="118" y2="145" stroke-opacity="0.25"/>
    <line x1="82" y1="145" x2="68" y2="140" stroke-opacity="0.25"/>
    <line x1="55" y1="112" x2="55" y2="88" stroke-opacity="0.25"/>
    <line x1="68" y1="60" x2="82" y2="55" stroke-opacity="0.25"/>
  </g>
</svg>