# OFA Center Configuration
# 版本信息从 pkg/version/version.go 获取
server:
  name: "ofa-center"

grpc:
  address: ":9090"

rest:
  address: ":8080"

database:
  type: "memory"

scheduler:
  default_strategy: "hybrid"
  max_concurrent: 1000
  task_timeout: 30s

agent:
  heartbeat_interval: 30s
  heartbeat_timeout: 60s
  offline_threshold: 120s
