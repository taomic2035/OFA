# OFA Center Configuration
server:
  name: "ofa-center"
  version: "0.9.0"

grpc:
  address: ":9090"

rest:
  address: ":8080"

database:
  type: "memory"

scheduler:
  default_strategy: "hybrid"
  max_concurrent: 1000
  task_timeout: 30s

agent:
  heartbeat_interval: 30s
  heartbeat_timeout: 60s
  offline_threshold: 120s
