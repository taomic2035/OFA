apiVersion: apps/v1
kind: Deployment
metadata:
  name: ofa-redis
  namespace: ofa-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ofa-redis
  template:
    metadata:
      labels:
        app: ofa-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command: ["redis-server", "--appendonly yes", "--maxmemory", "256mb"]
        volumeMounts:
        - name: redis-data
          mountPath: /data
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      volumes:
      - name: redis-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ofa-redis
  namespace: ofa-system
spec:
  selector:
    app: ofa-redis
  ports:
  - port: 6379
    targetPort: 6379
