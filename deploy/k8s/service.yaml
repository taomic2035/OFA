apiVersion: v1
kind: Service
metadata:
  name: ofa-center
  namespace: ofa-system
spec:
  selector:
    app: ofa-center
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: grpc
    port: 9090
    targetPort: 9090
  - name: ws
    port: 8081
    targetPort: 8081
  type: LoadBalancer
