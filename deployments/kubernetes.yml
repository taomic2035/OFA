apiVersion: v1
kind: Namespace
metadata:
  name: ofa
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ofa-center-config
  namespace: ofa
data:
  center.yaml: |
    server:
      name: "ofa-center"
      version: "0.5.0"

    grpc:
      address: ":9090"

    rest:
      address: ":8080"

    database:
      type: "sqlite"
      database: "/data/ofa.db"

    scheduler:
      default_strategy: "hybrid"
      max_concurrent: 1000
      task_timeout: 30s

    agent:
      heartbeat_interval: 30s
      heartbeat_timeout: 60s
      offline_threshold: 120s
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ofa-center
  namespace: ofa
  labels:
    app: ofa-center
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ofa-center
  template:
    metadata:
      labels:
        app: ofa-center
    spec:
      containers:
      - name: center
        image: ofa/center:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: grpc
        volumeMounts:
        - name: config
          mountPath: /app/configs
          readOnly: true
        - name: data
          mountPath: /data
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: ofa-center-config
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ofa-center
  namespace: ofa
spec:
  selector:
    app: ofa-center
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: grpc
    port: 9090
    targetPort: 9090
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ofa-center-ingress
  namespace: ofa
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ofa-center
            port:
              number: 8080